.5,499.3828,182.5,503.3828,192.5,507.3828" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="68" x="188.5" y="485.3169">Store data</text><line style="stroke:#181818;stroke-width:1.0;" x1="186.5" x2="228.5" y1="537.5156" y2="537.5156"/><line style="stroke:#181818;stroke-width:1.0;" x1="228.5" x2="228.5" y1="537.5156" y2="550.5156"/><line style="stroke:#181818;stroke-width:1.0;" x1="187.5" x2="228.5" y1="550.5156" y2="550.5156"/><polygon fill="#181818" points="197.5,546.5156,187.5,550.5156,197.5,554.5156" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="137" x="193.5" y="532.4497">Set data state: AVAIL</text><!--MD5=[1e198949515d253a3af35e6ca5d16dde]
@startuml
skinparam monochrome true
skinparam shadowing false
skinparam style strictuml
skinparam LifelineStrategy nosolid
skinparam sequenceMessageAlign center
title Work Request,\nPrerequisite Available Locally to the Requested Node

box "Client Node" #ffffff
participant Client as client
end box
box "Response Node" #ffffff
participant Store as store
participant Worker as worker
end box
database "Location Service" as ls

activate client
client -> ls: Locate work
activate ls
return Location: Response Node
deactivate client
client -> store ++: Request work
activate client
store -> store ++- -: Set work state: PEND
store - -> client: ACK
deactivate client
store -> store ++: Get prereq state
return AVAIL
store ->> worker **: Launch work
deactivate store
activate worker
return Data
destroy worker
activate store
store -> store ++: Store data
store -> store ++- -: Set data state: AVAIL
deactivate store
deactivate store
@enduml

