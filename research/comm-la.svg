:#383838;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="37" x="188.5" y="385.0669">AVAIL</text><line style="stroke:#383838;stroke-width:1.0;" x1="304" x2="294" y1="427.2656" y2="423.2656"/><line style="stroke:#383838;stroke-width:1.0;" x1="304" x2="294" y1="427.2656" y2="431.2656"/><line style="stroke:#383838;stroke-width:1.0;" x1="171.5" x2="305" y1="427.2656" y2="427.2656"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79" x="199.25" y="422.1997">Launch work</text><rect fill="#F8F8F8" height="30.2969" style="stroke:#383838;stroke-width:1.5;" width="63" x="306" y="406.1328"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="49" x="313" y="426.1279">Worker</text><line style="stroke:#383838;stroke-width:1.0;" x1="176.5" x2="186.5" y1="468.5625" y2="464.5625"/><line style="stroke:#383838;stroke-width:1.0;" x1="176.5" x2="186.5" y1="468.5625" y2="472.5625"/><line style="stroke:#383838;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="176.5" x2="336.5" y1="468.5625" y2="468.5625"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="31" x="241.5" y="463.4966">Data</text><line style="stroke:#383838;stroke-width:2.0;" x1="328.5" x2="346.5" y1="459.5625" y2="477.5625"/><line style="stroke:#383838;stroke-width:2.0;" x1="328.5" x2="346.5" y1="477.5625" y2="459.5625"/><line style="stroke:#383838;stroke-width:1.0;" x1="176.5" x2="223.5" y1="492.6953" y2="492.6953"/><line style="stroke:#383838;stroke-width:1.0;" x1="223.5" x2="223.5" y1="492.6953" y2="505.6953"/><line style="stroke:#383838;stroke-width:1.0;" x1="182.5" x2="223.5" y1="505.6953" y2="505.6953"/><polygon fill="#383838" points="192.5,501.6953,182.5,505.6953,192.5,509.6953" style="stroke:#383838;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="68" x="188.5" y="487.6294">Store data</text><line style="stroke:#383838;stroke-width:1.0;" x1="186.5" x2="228.5" y1="539.8281" y2="539.8281"/><line style="stroke:#383838;stroke-width:1.0;" x1="228.5" x2="228.5" y1="539.8281" y2="552.8281"/><line style="stroke:#383838;stroke-width:1.0;" x1="187.5" x2="228.5" y1="552.8281" y2="552.8281"/><polygon fill="#383838" points="197.5,548.8281,187.5,552.8281,197.5,556.8281" style="stroke:#383838;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="137" x="193.5" y="534.7622">Set data state: AVAIL</text><!--MD5=[e6cb60cf668c70202819cd29c71ea7c3]
@startuml
skinparam monochrome true
skinparam shadowing false
skinparam style strictuml
skinparam LifelineStrategy nosolid
skinparam sequenceMessageAlign center
title Work Request,\nPrerequisite Available Locally to the Requested Node

box "Client Node" #ffffff
participant Client as client
end box
box "Response Node" #ffffff
participant Store as store
participant Worker as worker
end box
database "Location Service" as ls

activate client
client -> ls: Locate work
activate ls
return Location: Response Node
deactivate client
client -> store ++: Request work
activate client
store -> store ++- -: Set work state: PEND
store - -> client: ACK
deactivate client
store -> store ++: Get prereq state
return AVAIL
store ->> worker **: Launch work
deactivate store
activate worker
return Data
destroy worker
activate store
store -> store ++: Store data
store -> store ++- -: Set data state: AVAIL
deactivate store
deactivate store
@enduml

