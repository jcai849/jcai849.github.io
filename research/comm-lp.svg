"634.6172"/><polygon fill="#181818" points="197.5,630.6172,187.5,634.6172,197.5,638.6172" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142" x="193.5" y="601.4185">Set prereq data state:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="37" x="246" y="616.5513">AVAIL</text><line style="stroke:#181818;stroke-width:1.0;" x1="186.5" x2="233.5" y1="663.75" y2="663.75"/><line style="stroke:#181818;stroke-width:1.0;" x1="233.5" x2="233.5" y1="663.75" y2="676.75"/><line style="stroke:#181818;stroke-width:1.0;" x1="192.5" x2="233.5" y1="676.75" y2="676.75"/><polygon fill="#181818" points="202.5,672.75,192.5,676.75,202.5,680.75" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="189" x="198.5" y="658.6841">Get prereq state associations</text><line style="stroke:#181818;stroke-width:1.0;" x1="476" x2="466" y1="710.8828" y2="706.8828"/><line style="stroke:#181818;stroke-width:1.0;" x1="476" x2="466" y1="710.8828" y2="714.8828"/><line style="stroke:#181818;stroke-width:1.0;" x1="171.5" x2="477" y1="710.8828" y2="710.8828"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79" x="285.25" y="705.8169">Launch work</text><rect fill="#E3E3E3" height="30.2969" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="63" x="478" y="689.75"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="49" x="485" y="709.7451">Worker</text><!--MD5=[1ff9006bc1867683d7655131a2cb8f1d]
@startuml
skinparam monochrome true
skinparam shadowing false
skinparam style strictuml
skinparam LifelineStrategy nosolid
skinparam sequenceMessageAlign center
title Work Request,\nPrerequisite Pending Locally to the Store


box "Client Node" #ffffff
participant Client as client
end box
box "Response Node" #ffffff
participant Store as store
participant "Prerequsite Worker" as pworker
participant Worker as worker
end box
database "Location Service" as ls

activate pworker
activate client
client -> ls: Locate work
activate ls
return Location: Response Node
deactivate client
client -> store ++: Request work
activate client
store -> store ++- -: Set work state: PEND
store - -> client: ACK
deactivate client
store -> store ++: Get prereq state
return PEND
store -> store ++- -: Set prereq state association:\nAVAIL -> Launch work
deactivate store
...
pworker - ->> store: Prereq data
destroy pworker
activate store
store -> store ++: Store data
store -> store ++: Set prereq data state:\nAVAIL
store -> store ++: Get prereq state associations
store ->> worker **: Launch work
deactivate store
deactivate store
deactivate store
deactivate store
activate worker
|||
@enduml

