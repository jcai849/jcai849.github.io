st="spacing" textLength="142" x="193.5" y="603.731">Set prereq data state:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="37" x="193.5" y="618.8638">AVAIL</text><line style="stroke:#383838;stroke-width:1.0;" x1="186.5" x2="233.5" y1="666.0625" y2="666.0625"/><line style="stroke:#383838;stroke-width:1.0;" x1="233.5" x2="233.5" y1="666.0625" y2="679.0625"/><line style="stroke:#383838;stroke-width:1.0;" x1="192.5" x2="233.5" y1="679.0625" y2="679.0625"/><polygon fill="#383838" points="202.5,675.0625,192.5,679.0625,202.5,683.0625" style="stroke:#383838;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="189" x="198.5" y="660.9966">Get prereq state associations</text><line style="stroke:#383838;stroke-width:1.0;" x1="476" x2="466" y1="713.1953" y2="709.1953"/><line style="stroke:#383838;stroke-width:1.0;" x1="476" x2="466" y1="713.1953" y2="717.1953"/><line style="stroke:#383838;stroke-width:1.0;" x1="171.5" x2="477" y1="713.1953" y2="713.1953"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79" x="285.25" y="708.1294">Launch work</text><rect fill="#F8F8F8" height="30.2969" style="stroke:#383838;stroke-width:1.5;" width="63" x="478" y="692.0625"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="49" x="485" y="712.0576">Worker</text><!--MD5=[2f9fea3ed14b3d5b4cabc1f8ea883724]
@startuml
skinparam monochrome true
skinparam shadowing false
skinparam style strictuml
skinparam LifelineStrategy nosolid
skinparam sequenceMessageAlign center
title Work Request,\nPrerequisite Pending Locally to the Store


box "Client Node" #ffffff
participant Client as client
end box
box "Response Node" #ffffff
participant Store as store
participant "Prerequsite Worker" as pworker
participant Worker as worker
end box
database "Location Service" as ls

activate pworker
activate client
client -> ls: Locate work
activate ls
return Location: Response Node
deactivate client
client -> store ++: Request work
activate client
store -> store ++- -: Set work state: PEND
store - -> client: ACK
deactivate client
store -> store ++: Get prereq state
return PEND
store -> store ++- -: Set prereq state association:\nAVAIL -> Launch work
deactivate store
...
pworker - ->> store: Prereq data
destroy pworker
activate store
store -> store ++: Store data
store -> store ++: Set prereq data state:\nAVAIL
store -> store ++: Get prereq state associations
store ->> worker **: Launch work
deactivate store
deactivate store
deactivate store
deactivate store
activate worker
|||
@enduml

